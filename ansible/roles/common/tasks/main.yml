- name: Common packages block
  become: true
  tags:
    - common
    - packages
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Retry apt cache with fix-missing
      ansible.builtin.apt:
        update_cache: true
        force_apt_get: true

  always:
    - name: Write common role completion log
      ansible.builtin.copy:
        dest: /tmp/common_role_done.log
        content: "common role completed\n"
        mode: "0644"

- name: Users block
  become: true
  tags:
    - common
    - users
  block:
    - name: Ensure docker group exists
      ansible.builtin.group:
        name: docker
        state: present