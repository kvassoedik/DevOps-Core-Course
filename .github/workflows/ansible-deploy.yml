name: Ansible Deployment

on:
  push:
    branches:
      - master
      - lab06
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-deploy.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-deploy.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible + lint
        run: |
          pip install ansible ansible-lint
          ansible-galaxy collection install community.docker

      - name: Create vault password file for CI
        run: |
          cd ansible
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
          chmod 600 .vault_pass

      - name: Run ansible-lint
        run: |
          cd ansible
          ansible-lint -c .ansible-lint playbooks/*.yml roles/**/tasks/*.yml roles/**/handlers/*.yml
      - name: Cleanup vault password file
        if: always()
        run: |
          rm -f ansible/.vault_pass

  deploy:
    needs: lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install community.docker (runner)
        run: |
          ansible-galaxy collection install community.docker

      - name: Deploy
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          cd ansible
          echo "$ANSIBLE_VAULT_PASSWORD" > /tmp/vault_pass
          ansible-playbook playbooks/deploy.yml --vault-password-file /tmp/vault_pass
          rm -f /tmp/vault_pass

      - name: Verify
        run: |
          curl -f http://127.0.0.1:5000/ >/dev/null